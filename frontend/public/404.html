<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ELENA EPSHTEIN - Luxury Nails &amp; Design</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Redirects sub-paths to index.html while preserving the path in sessionStorage
      var segmentCount = 1; // number of path segments in the base URL (e.g. /Elena-nails-design/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
